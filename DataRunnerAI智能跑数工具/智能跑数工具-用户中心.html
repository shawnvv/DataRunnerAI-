<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DataRunner AI - 用户中心 | 登录注册与部门权限</title>
    <!-- Google Font & Font Awesome -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f5f7fb;
            color: #1e293b;
            height: 100vh;
            overflow: hidden;
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #e9eef3;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        /* 整体布局 grid */
        .app-container {
            display: grid;
            grid-template-columns: 260px 1fr;
            height: 100vh;
        }

        /* 侧边栏 */
        .sidebar {
            background: #ffffff;
            border-right: 1px solid #e9edf2;
            display: flex;
            flex-direction: column;
            padding: 24px 16px;
            box-shadow: 0 0 8px rgba(0,0,0,0.02);
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 32px;
            padding-left: 8px;
        }
        .logo-icon {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            width: 32px;
            height: 32px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
        }
        .logo-text {
            font-weight: 700;
            font-size: 20px;
            background: linear-gradient(135deg, #1e293b, #3b82f6);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .nav-menu {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 500;
            color: #475569;
            transition: all 0.2s;
            cursor: pointer;
        }
        .nav-item i {
            width: 22px;
            font-size: 1.2rem;
        }
        .nav-item.active {
            background: #eff6ff;
            color: #2563eb;
        }
        .nav-item:not(.active):hover {
            background: #f8fafc;
            color: #1e293b;
        }
        .bottom-info {
            margin-top: auto;
            padding-top: 20px;
            font-size: 12px;
            color: #94a3b8;
            border-top: 1px solid #edf2f7;
            padding-left: 12px;
        }

        /* 主内容区 */
        .main-content {
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            background: #f8fafc;
        }

        /* 顶部栏 */
        .top-bar {
            background: white;
            padding: 12px 28px;
            border-bottom: 1px solid #eef2f6;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        .page-title {
            font-weight: 600;
            font-size: 18px;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #f8fafc;
            padding: 5px 16px 5px 12px;
            border-radius: 40px;
        }
        .avatar {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }
        .logout-btn {
            background: none;
            border: none;
            color: #ef4444;
            cursor: pointer;
            font-size: 14px;
        }

        /* 内容区域 */
        .user-container {
            padding: 24px 28px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* 登录注册卡片 */
        .auth-card {
            background: white;
            border-radius: 28px;
            border: 1px solid #eef2f8;
            padding: 32px;
            max-width: 500px;
            margin: 0 auto;
            width: 100%;
        }
        .auth-tabs {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
            border-bottom: 1px solid #edf2f7;
        }
        .auth-tab {
            background: none;
            border: none;
            padding: 8px 0;
            font-weight: 600;
            cursor: pointer;
            color: #6c86a3;
            border-bottom: 2px solid transparent;
        }
        .auth-tab.active {
            color: #2563eb;
            border-bottom-color: #2563eb;
        }
        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .form-label {
            font-weight: 500;
            font-size: 13px;
        }
        input, select {
            padding: 10px 14px;
            border-radius: 14px;
            border: 1px solid #e2e8f0;
            font-size: 13px;
        }
        .primary-btn {
            background: linear-gradient(95deg, #2563eb, #4f46e5);
            border: none;
            padding: 10px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .primary-btn:hover {
            background: linear-gradient(95deg, #1d4ed8, #4338ca);
        }
        .error-msg {
            color: #ef4444;
            font-size: 12px;
        }

        /* 用户信息卡片 */
        .info-card {
            background: white;
            border-radius: 24px;
            border: 1px solid #eef2f8;
            padding: 24px;
        }
        .permission-badge {
            display: inline-block;
            background: #eef2ff;
            color: #2563eb;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 12px;
            margin: 4px 6px 0 0;
        }
        .user-table {
            overflow-x: auto;
            margin-top: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        th, td {
            padding: 12px 12px;
            text-align: left;
            border-bottom: 1px solid #edf2f7;
        }
        th {
            background: #fafcff;
            font-weight: 600;
        }
        .action-icon {
            background: none;
            border: none;
            cursor: pointer;
            color: #5b6e8c;
            margin: 0 4px;
        }
        .action-icon:hover {
            color: #2563eb;
        }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-container {
            background: white;
            border-radius: 28px;
            width: 450px;
            max-width: 90%;
            padding: 24px;
        }
        .hidden {
            display: none;
        }
        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>
<body>
<div class="app-container">
    <aside class="sidebar">
        <div class="logo-area">
            <div class="logo-icon"><i class="fas fa-brain"></i></div>
            <div class="logo-text">DataRunner AI</div>
        </div>
        <div class="nav-menu">
            <div class="nav-item"><i class="fas fa-microphone-alt"></i> AI工作台</div>
            <div class="nav-item"><i class="fas fa-chart-line"></i> 查询中心</div>
            <div class="nav-item"><i class="fas fa-scroll"></i> Prompt工坊</div>
            <div class="nav-item"><i class="fas fa-clock"></i> 任务调度</div>
            <div class="nav-item"><i class="fas fa-database"></i> 模型中心</div>
            <div class="nav-item active"><i class="fas fa-users"></i> 用户中心</div>
        </div>
        <div class="bottom-info">
            <i class="fas fa-shield-alt"></i> 数据安全审计中<br>
            v2.0 · 社媒分析版
        </div>
    </aside>

    <main class="main-content">
        <div class="top-bar">
            <div class="page-title"><i class="fas fa-users"></i> 用户中心 · 部门权限管理</div>
            <div id="topUserInfo" class="user-info hidden">
                <div class="avatar" id="userAvatar">U</div>
                <span id="topUsername"></span>
                <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> 退出</button>
            </div>
        </div>

        <div class="user-container" id="userContainer">
            <!-- 未登录时显示登录注册卡片 -->
            <div id="authPanel" class="auth-card">
                <div class="auth-tabs">
                    <button class="auth-tab active" data-tab="login">登录</button>
                    <button class="auth-tab" data-tab="register">注册</button>
                </div>
                <!-- 登录表单 -->
                <div id="loginForm" class="auth-form">
                    <div class="form-group">
                        <div class="form-label">用户名</div>
                        <input type="text" id="loginUsername" placeholder="请输入用户名">
                    </div>
                    <div class="form-group">
                        <div class="form-label">密码</div>
                        <input type="password" id="loginPassword" placeholder="请输入密码">
                    </div>
                    <div id="loginError" class="error-msg"></div>
                    <button class="primary-btn" id="doLoginBtn">登录</button>
                    <div style="font-size:12px; color:#6c86a3; text-align:center;">测试账号：admin / admin123 (管理员) 或 注册新账号</div>
                </div>
                <!-- 注册表单 -->
                <div id="registerForm" class="auth-form hidden">
                    <div class="form-group">
                        <div class="form-label">用户名</div>
                        <input type="text" id="regUsername" placeholder="3-20位字母数字">
                    </div>
                    <div class="form-group">
                        <div class="form-label">密码</div>
                        <input type="password" id="regPassword" placeholder="至少6位">
                    </div>
                    <div class="form-group">
                        <div class="form-label">选择部门（决定权限）</div>
                        <select id="regDepartment">
                            <option value="市场部">市场部</option>
                            <option value="运营部">运营部</option>
                            <option value="数据部">数据部</option>
                            <option value="技术部">技术部</option>
                        </select>
                        <div style="font-size:11px; color:#6c86a3; margin-top:4px;">* 管理员部门需由现有管理员创建</div>
                    </div>
                    <div id="regError" class="error-msg"></div>
                    <button class="primary-btn" id="doRegisterBtn">注册</button>
                </div>
            </div>
        </div>
    </main>
</div>

<!-- 编辑用户模态框（管理员） -->
<div id="editUserModal" class="modal-overlay hidden">
    <div class="modal-container">
        <div class="flex-between" style="margin-bottom:16px;">
            <h3>编辑用户部门</h3>
            <i class="fas fa-times" style="cursor:pointer;" id="closeEditModal"></i>
        </div>
        <div class="form-group">
            <div class="form-label">用户名</div>
            <input type="text" id="editUsername" disabled>
        </div>
        <div class="form-group">
            <div class="form-label">选择部门</div>
            <select id="editDepartment">
                <option value="市场部">市场部</option>
                <option value="运营部">运营部</option>
                <option value="数据部">数据部</option>
                <option value="技术部">技术部</option>
                <option value="管理员部门">管理员部门</option>
            </select>
        </div>
        <div class="flex-between" style="margin-top:20px;">
            <button class="secondary-btn" id="cancelEditBtn">取消</button>
            <button class="primary-btn" id="saveEditBtn">保存修改</button>
        </div>
    </div>
</div>

<script>
    // ---------- 权限映射 ----------
    const departmentPermissions = {
        "市场部": ["AI工作台", "查询中心"],
        "运营部": ["AI工作台", "Prompt工坊", "任务调度"],
        "数据部": ["查询中心", "Prompt工坊", "模型中心"],
        "技术部": ["AI工作台", "查询中心", "Prompt工坊", "任务调度", "模型中心"],
        "管理员部门": ["AI工作台", "查询中心", "Prompt工坊", "任务调度", "模型中心", "用户管理"]
    };

    // 初始化用户数据 localStorage
    let users = [
        { id: "1", username: "admin", password: "admin123", department: "管理员部门", createdAt: "2025-01-01" },
        { id: "2", username: "张三", password: "123456", department: "市场部", createdAt: "2025-02-10" },
        { id: "3", username: "李四", password: "123456", department: "运营部", createdAt: "2025-02-15" },
        { id: "4", username: "王五", password: "123456", department: "数据部", createdAt: "2025-02-20" }
    ];

    let currentUser = null; // 当前登录用户

    // 初始化存储
    function initStorage() {
        if (!localStorage.getItem("datasight_users")) {
            localStorage.setItem("datasight_users", JSON.stringify(users));
        } else {
            users = JSON.parse(localStorage.getItem("datasight_users"));
        }
        // 检查登录状态
        const storedUser = localStorage.getItem("datasight_currentUser");
        if (storedUser) {
            currentUser = JSON.parse(storedUser);
            // 验证用户是否存在
            const exists = users.find(u => u.username === currentUser.username);
            if (!exists) {
                currentUser = null;
                localStorage.removeItem("datasight_currentUser");
            }
        }
    }

    function saveUsers() {
        localStorage.setItem("datasight_users", JSON.stringify(users));
    }

    function saveCurrentUser() {
        if (currentUser) {
            localStorage.setItem("datasight_currentUser", JSON.stringify(currentUser));
        } else {
            localStorage.removeItem("datasight_currentUser");
        }
    }

    // 渲染登录后界面
    function renderUserDashboard() {
        const container = document.getElementById("userContainer");
        if (!currentUser) {
            // 显示登录注册卡片
            container.innerHTML = `
                <div class="auth-card">
                    <div class="auth-tabs">
                        <button class="auth-tab active" data-tab="login">登录</button>
                        <button class="auth-tab" data-tab="register">注册</button>
                    </div>
                    <div id="loginForm" class="auth-form">
                        <div class="form-group"><div class="form-label">用户名</div><input type="text" id="loginUsername" placeholder="请输入用户名"></div>
                        <div class="form-group"><div class="form-label">密码</div><input type="password" id="loginPassword" placeholder="请输入密码"></div>
                        <div id="loginError" class="error-msg"></div>
                        <button class="primary-btn" id="doLoginBtn">登录</button>
                        <div style="font-size:12px; color:#6c86a3; text-align:center;">测试账号：admin / admin123 (管理员) 或 注册新账号</div>
                    </div>
                    <div id="registerForm" class="auth-form hidden">
                        <div class="form-group"><div class="form-label">用户名</div><input type="text" id="regUsername" placeholder="3-20位字母数字"></div>
                        <div class="form-group"><div class="form-label">密码</div><input type="password" id="regPassword" placeholder="至少6位"></div>
                        <div class="form-group"><div class="form-label">选择部门</div><select id="regDepartment"><option value="市场部">市场部</option><option value="运营部">运营部</option><option value="数据部">数据部</option><option value="技术部">技术部</option></select></div>
                        <div id="regError" class="error-msg"></div>
                        <button class="primary-btn" id="doRegisterBtn">注册</button>
                    </div>
                </div>
            `;
            bindAuthEvents();
            document.getElementById("topUserInfo").classList.add("hidden");
            return;
        }

        // 已登录，显示用户信息面板
        const perms = departmentPermissions[currentUser.department] || [];
        const isAdmin = currentUser.department === "管理员部门";
        let userHtml = `
            <div class="info-card">
                <div class="flex-between">
                    <h3><i class="fas fa-user-circle"></i> 个人信息</h3>
                    <span class="status-badge" style="background:#eef2ff;">${currentUser.department}</span>
                </div>
                <div style="margin-top: 16px;">
                    <p><strong>用户名：</strong> ${currentUser.username}</p>
                    <p><strong>部门：</strong> ${currentUser.department}</p>
                    <p><strong>注册时间：</strong> ${currentUser.createdAt || "—"}</p>
                    <div style="margin-top: 12px;"><strong>可访问模块（权限）：</strong><br>
                        ${perms.map(p => `<span class="permission-badge"><i class="fas fa-check-circle"></i> ${p}</span>`).join('')}
                    </div>
                </div>
            </div>
        `;

        // 管理员额外显示用户管理表格
        if (isAdmin) {
            userHtml += `
                <div class="info-card" style="margin-top: 20px;">
                    <div class="flex-between">
                        <h3><i class="fas fa-users-cog"></i> 用户管理（可修改部门绑定）</h3>
                        <button class="secondary-btn" id="refreshUserList"><i class="fas fa-sync-alt"></i> 刷新</button>
                    </div>
                    <div class="user-table">
                        <table id="adminUserTable">
                            <thead><tr><th>用户名</th><th>部门</th><th>注册时间</th><th>操作</th></tr></thead>
                            <tbody id="userTableBody"></tbody>
                        </table>
                    </div>
                </div>
            `;
        }
        container.innerHTML = userHtml;

        // 显示顶部用户信息
        document.getElementById("topUserInfo").classList.remove("hidden");
        document.getElementById("topUsername").innerText = currentUser.username;
        document.getElementById("userAvatar").innerText = currentUser.username.charAt(0).toUpperCase();

        if (isAdmin) {
            renderUserTable();
            document.getElementById("refreshUserList")?.addEventListener("click", renderUserTable);
        }
    }

    function renderUserTable() {
        const tbody = document.getElementById("userTableBody");
        if (!tbody) return;
        tbody.innerHTML = users.map(user => `
            <tr>
                <td>${user.username}</td>
                <td><span class="permission-badge">${user.department}</span></td>
                <td>${user.createdAt || "—"}</td>
                <td>
                    <button class="action-icon edit-user" data-id="${user.id}" data-username="${user.username}" data-dept="${user.department}"><i class="fas fa-edit"></i></button>
                    <button class="action-icon delete-user" data-id="${user.id}" ${user.username === currentUser.username ? 'disabled style="opacity:0.5;"' : ''}><i class="fas fa-trash-alt"></i></button>
                </td>
            </tr>
        `).join('');
        // 绑定编辑事件
        document.querySelectorAll('.edit-user').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = btn.getAttribute('data-id');
                const username = btn.getAttribute('data-username');
                const dept = btn.getAttribute('data-dept');
                openEditModal(id, username, dept);
            });
        });
        document.querySelectorAll('.delete-user').forEach(btn => {
            btn.addEventListener('click', (e) => {
                if (btn.disabled) return;
                const id = btn.getAttribute('data-id');
                if (confirm("确定删除该用户吗？")) {
                    users = users.filter(u => u.id !== id);
                    saveUsers();
                    renderUserTable();
                }
            });
        });
    }

    function openEditModal(userId, username, currentDept) {
        const modal = document.getElementById("editUserModal");
        document.getElementById("editUsername").value = username;
        document.getElementById("editDepartment").value = currentDept;
        modal.classList.remove("hidden");
        // 保存时更新
        const saveBtn = document.getElementById("saveEditBtn");
        const newSave = () => {
            const newDept = document.getElementById("editDepartment").value;
            const userIndex = users.findIndex(u => u.id === userId);
            if (userIndex !== -1) {
                users[userIndex].department = newDept;
                saveUsers();
                // 如果修改的是当前登录用户，刷新当前用户信息
                if (currentUser && currentUser.id === userId) {
                    currentUser.department = newDept;
                    saveCurrentUser();
                    renderUserDashboard();
                } else {
                    renderUserTable();
                }
            }
            closeEditModal();
            saveBtn.removeEventListener("click", newSave);
        };
        saveBtn.removeEventListener("click", newSave);
        saveBtn.addEventListener("click", newSave);
    }

    function closeEditModal() {
        document.getElementById("editUserModal").classList.add("hidden");
    }

    // 登录逻辑
    function login(username, password) {
        const user = users.find(u => u.username === username && u.password === password);
        if (user) {
            currentUser = { id: user.id, username: user.username, department: user.department, createdAt: user.createdAt };
            saveCurrentUser();
            renderUserDashboard();
            return true;
        } else {
            return false;
        }
    }

    function register(username, password, department) {
        if (users.find(u => u.username === username)) {
            return { success: false, msg: "用户名已存在" };
        }
        if (username.length < 3 || !/^[a-zA-Z0-9\u4e00-\u9fa5]{3,20}$/.test(username)) {
            return { success: false, msg: "用户名需3-20位字母数字或中文" };
        }
        if (password.length < 6) {
            return { success: false, msg: "密码至少6位" };
        }
        const newUser = {
            id: Date.now().toString(),
            username,
            password,
            department,
            createdAt: new Date().toISOString().slice(0,10)
        };
        users.push(newUser);
        saveUsers();
        return { success: true };
    }

    function logout() {
        currentUser = null;
        saveCurrentUser();
        renderUserDashboard();
    }

    // 绑定登录注册表单事件
    function bindAuthEvents() {
        // Tab切换
        const tabs = document.querySelectorAll('.auth-tab');
        const loginFormDiv = document.getElementById('loginForm');
        const registerFormDiv = document.getElementById('registerForm');
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                if (tab.getAttribute('data-tab') === 'login') {
                    loginFormDiv.classList.remove('hidden');
                    registerFormDiv.classList.add('hidden');
                } else {
                    loginFormDiv.classList.add('hidden');
                    registerFormDiv.classList.remove('hidden');
                }
            });
        });
        // 登录按钮
        const loginBtn = document.getElementById('doLoginBtn');
        if (loginBtn) {
            loginBtn.addEventListener('click', () => {
                const username = document.getElementById('loginUsername').value.trim();
                const password = document.getElementById('loginPassword').value;
                const errorDiv = document.getElementById('loginError');
                if (!username || !password) {
                    errorDiv.innerText = "请输入用户名和密码";
                    return;
                }
                if (login(username, password)) {
                    errorDiv.innerText = "";
                } else {
                    errorDiv.innerText = "用户名或密码错误";
                }
            });
        }
        // 注册按钮
        const regBtn = document.getElementById('doRegisterBtn');
        if (regBtn) {
            regBtn.addEventListener('click', () => {
                const username = document.getElementById('regUsername').value.trim();
                const password = document.getElementById('regPassword').value;
                const department = document.getElementById('regDepartment').value;
                const errorDiv = document.getElementById('regError');
                const result = register(username, password, department);
                if (result.success) {
                    errorDiv.innerText = "";
                    alert("注册成功！请登录");
                    // 切换到登录tab
                    document.querySelector('.auth-tab[data-tab="login"]').click();
                    document.getElementById('loginUsername').value = username;
                } else {
                    errorDiv.innerText = result.msg;
                }
            });
        }
    }

    // 退出按钮
    document.getElementById("logoutBtn")?.addEventListener("click", logout);
    document.getElementById("closeEditModal")?.addEventListener("click", closeEditModal);
    document.getElementById("cancelEditBtn")?.addEventListener("click", closeEditModal);

    // 初始化
    initStorage();
    renderUserDashboard();
</script>
</body>
</html>
